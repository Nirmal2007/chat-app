<!DOCTYPE html>
<html>

<head>
  <title>Messenger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #000000;
      color: #ffffff;
    }

    #chat {
      list-style-type: none;
      padding: 0;
    }

    #chat li {
      background: #f1f1f1;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
    }
    .container {
      
      margin: auto;
      background: #333333;
      padding: 20px;
      border-radius: 10px;
      
      text-align: center;
    }
    .container button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    .container button:hover {
      background: #0056b3;
    }
    .container input {
      padding: 10px;
      width: 70%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
  </style>

</head>

<body>
  <div class="container">
    <h2>Messenger💬</h2>
  
    <input id="msg" placeholder="Type message..." />
    <button onclick="sendMsg()">Send📩</button>
  
    <ul id="chat"></ul>

  </div>


  <script>
    // ✅ Correct WebSocket (works for LAN + WAN + Ngrok)
    const ws = new WebSocket(
      location.protocol === "https:"
        ? `wss://${location.host}`
        : `ws://${location.host}`
    );

    ws.onopen = () => {
      console.log("✅ Connected to server");
    };

    ws.onmessage = (event) => {
      const li = document.createElement("li");
      li.textContent = event.data;
      document.getElementById("chat").appendChild(li);
    };

    ws.onerror = (err) => {
      console.log("❌ WebSocket error:", err);
    };

    function sendMsg() {
      const input = document.getElementById("msg");
      ws.send(input.value);
      input.value = "";
    }
  </script>

</body>

</html>
